name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r plugins/ui-asset-studio/skills/ui-asset-studio/scripts/requirements.txt
      - name: Run unit tests
        run: >-
          python -m unittest discover
          -s plugins/ui-asset-studio/skills/ui-asset-studio/tests
          -p 'test_*.py'
